services:
  nextjs:
    container_name: mdc-nextjs
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://app:80
      SITE_URL: https://marchasdecristo.com
    depends_on:
      - app
    restart: unless-stopped

  app:
    container_name: mdc-app
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8080:80"
    environment:
      NODE_ENV: production
      APP_PORT: 80
      DB_PATH: /app/data/mdc.db
    env_file: .env
    volumes:
      - ${COVER_DIR:-/var/www/mdc-assets/cover}:/app/public/cover:ro
      - mdc-sqlite-data:/app/data
    restart: unless-stopped

volumes:
  mdc-sqlite-data:
