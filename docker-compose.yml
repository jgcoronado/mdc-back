services:
  nextjs:
    container_name: mdc-nextjs
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      SITE_URL: https://marchasdecristo.com
      DB_PATH: /app/data/mdc.db
    volumes:
      - ${COVER_DIR:-/var/www/mdc-assets/cover}:/app/public/cover:ro
      - mdc-sqlite-data:/app/data
    restart: unless-stopped

volumes:
  mdc-sqlite-data:
