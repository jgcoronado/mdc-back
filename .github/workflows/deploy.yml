name: Deploy

# Pipeline de despliegue de CÓDIGO a PRODUCCIÓN. La base de datos va aparte y
# siempre manual: scripts/sync_db_to_prod.php.
#
#   push a main       → verify (CI reutilizable). NO despliega solo.
#   workflow_dispatch → verify → deploy a PRO (el gesto de «valido en local y
#                       promociono»). Para rollback: Run workflow eligiendo un
#                       tag/commit anterior en el desplegable de ref.
#
# La validación previa se hace en LOCAL (no hay entorno de preproducción).
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   FTP_HOST, FTP_USER, FTP_PASSWORD  — credenciales FTP de HelioHost
# Variables opcionales:
#   PRO_BASE_URL                      — para sobrescribir la URL por defecto
#
# El pipeline NUNCA toca: config.local.php (secretos por host), private/
# (BD, backups, propuestas, rate-limit), cover/ (las portadas solo viven en
# el servidor) ni .well-known/ (retos de Let's Encrypt de Plesk).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Un despliegue cada vez, sin cancelar el que esté en curso (un mirror FTP
# interrumpido a mitad deja el entorno en un estado mixto).
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  # Sonda de configuración: los secrets no pueden usarse en un `if` de job, así
  # que aquí (donde sí son accesibles vía env) se convierten en un output que sí
  # se puede condicionar. Sirve para OMITIR (no fallar) el deploy cuando no hay
  # credenciales FTP: así un fork sin secrets no deja runs en rojo.
  check-config:
    runs-on: ubuntu-latest
    outputs:
      ftp: ${{ steps.probe.outputs.ftp }}
    steps:
      - id: probe
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          [ -n "$FTP_HOST" ] && echo "ftp=true" >> "$GITHUB_OUTPUT" || echo "ftp=false" >> "$GITHUB_OUTPUT"

  deploy-pro:
    needs: [verify, check-config]
    if: github.event_name == 'workflow_dispatch' && needs.check-config.outputs.ftp == 'true'
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.PRO_BASE_URL || 'https://marchasdecristo.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: curl, dom, json
          coverage: none

      - name: Instalar lftp
        run: sudo apt-get update -q && sudo apt-get install -y -q lftp

      - name: Activar modo mantenimiento
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "deploy de código en curso desde CI — $(date -u +%FT%TZ)" > /tmp/maint
          lftp -u "$FTP_USER,$FTP_PASSWORD" "ftp://$FTP_HOST" <<'LFTP'
          set cmd:fail-exit true
          set ftp:ssl-allow false
          put /tmp/maint -o private/.maintenance
          quit
          LFTP

      - name: Desplegar código a PRO (lftp mirror)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASSWORD" "ftp://$FTP_HOST" <<'LFTP'
          set cmd:fail-exit true
          set ftp:ssl-allow false
          set net:max-retries 2
          set net:timeout 30
          mirror -R --delete --parallel=2 -x ^config\.local\.php$ php/app app
          mirror -R --delete --parallel=2 -x ^cover/ -x ^\.well-known/ php/public marchasdecristo.com
          quit
          LFTP

      - name: Desactivar modo mantenimiento (siempre, incluso si el mirror falló)
        if: always()
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASSWORD" "ftp://$FTP_HOST" <<'LFTP'
          set ftp:ssl-allow false
          rm -f private/.maintenance
          quit
          LFTP

      - name: Smoke remoto contra PRO
        run: php php/tools/smoke_remote.php "$BASE_URL"
